services:
  - type: web
    name: cookieiq-api
    runtime: node
    buildCommand: apt-get update && apt-get install -y chromium && npm install
    startCommand: node server/index.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 3001
      - key: PUPPETEER_ARGS
        value: "--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage"
